{% extends 'base.html' %}

{% block title %}Вход — IT Helpdesk{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="logo-center">
            <h1>IT HELPDESK</h1>
            <p>ООО «МАГНАТ»</p>
        </div>
        <div class="sub">Войдите в систему</div>

        <form method="POST">
            <div class="form-group">
                <label>👤 Логин</label>
                <input type="text" name="username" placeholder="Введите логин" required>
            </div>
            <div class="form-group">
                <label>🔒 Пароль</label>
                <input type="password" name="password" placeholder="Введите пароль" required>
            </div>
            <div class="form-group" style="display:flex; align-items:center; gap:8px;">
                <input type="checkbox" name="remember" id="remember" style="width:auto;">
                <label for="remember" style="font-size:0.85rem; color:var(--text-muted);">Запомнить меня</label>
            </div>
            <button type="submit" class="btn-primary">Войти →</button>
        </form>

        <div class="auth-link">
            Нет аккаунта? <a href="/register">Зарегистрироваться</a>
        </div>
        <div class="auth-link" style="margin-top:8px; font-size:0.75rem;">
            <a href="/forgot_password">Забыли пароль?</a>
        </div>
    </div>
</div>
{% endblock %}
