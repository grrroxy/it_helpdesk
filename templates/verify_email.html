<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подтверждение почты — IT Helpdesk</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #f2f2f7;
            --bg-card: rgba(255,255,255,0.95);
            --text-primary: #000000;
            --text-secondary: #6c6c70;
            --border-color: #c6c6c8;
            --input-bg: rgba(0,0,0,0.05);
            --shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }

        body.dark {
            --bg-primary: #000000;
            --bg-card: rgba(28,28,30,0.95);
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
            --border-color: #38383a;
            --input-bg: rgba(255,255,255,0.1);
            --shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.3s;
        }

        .theme-top-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 10px 15px;
            cursor: pointer;
            font-size: 1.2rem;
            z-index: 100;
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 48px 40px;
            width: 420px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
        }

        .sub {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.85rem;
        }

        .email-display {
            text-align: center;
            background: var(--input-bg);
            padding: 0.5rem;
            border-radius: 20px;
            margin-bottom: 1rem;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 1rem;
            margin: 0.5rem 0;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            color: var(--text-primary);
            font-size: 1rem;
            text-align: center;
            letter-spacing: 3px;
            font-size: 1.2rem;
        }

        button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 32px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }

        .resend-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            margin-top: 0.5rem;
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }
        .back-link a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
        }

        .message {
            background: rgba(48,209,88,0.2);
            color: #30d158;
            padding: 0.75rem;
            border-radius: 20px;
            margin-top: 1rem;
            text-align: center;
            font-size: 0.85rem;
        }

        .error {
            background: rgba(255,69,58,0.2);
            color: #ff453a;
            padding: 0.75rem;
            border-radius: 20px;
            margin-top: 1rem;
            text-align: center;
            font-size: 0.85rem;
        }

        .hint {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-align: center;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
<button class="theme-top-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>

<div class="card">
    <h1>Подтверждение почты</h1>
    <div class="sub">Введите код из письма</div>

    <div class="email-display">
        📧 {{ email }}
    </div>

    <form method="POST">
        <input type="text" name="verification_code" placeholder="6-значный код" maxlength="6" required>
        <button type="submit">✅ Подтвердить</button>
    </form>

    <form method="POST" action="/resend_code">
        <button type="submit" class="resend-btn">🔄 Отправить код повторно</button>
    </form>

    {% if message %}
    <div class="message">{{ message }}</div>
    {% endif %}

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <div class="hint">
        Код действителен 15 минут
    </div>

    <div class="back-link">
        <a href="/register">← Назад к регистрации</a>
    </div>
</div>

<script>
    function toggleTheme() {
        document.body.classList.toggle('dark');
        const btn = document.getElementById('themeBtn');
        if (document.body.classList.contains('dark')) {
            btn.innerHTML = '☀️';
            localStorage.setItem('theme', 'dark');
        } else {
            btn.innerHTML = '🌙';
            localStorage.setItem('theme', 'light');
        }
    }
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
        document.getElementById('themeBtn').innerHTML = '☀️';
    }
</script>
</body>
</html>
