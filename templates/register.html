{% extends 'base.html' %}

{% block title %}Регистрация — IT Helpdesk{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="logo-center">
            <h1>IT HELPDESK</h1>
            <p>ООО «МАГНАТ»</p>
        </div>
        <div class="sub">Создайте аккаунт</div>

        <form method="POST">
            <div class="form-group">
                <label>Полное ФИО</label>
                <input type="text" name="full_name" placeholder="Введите полное ФИО" required>
            </div>
            <div class="form-group">
                <label>Логин</label>
                <input type="text" name="username" placeholder="Придумайте логин" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="your@email.com" required>
            </div>
            <div class="form-group password-field">
                <label>Пароль</label>
                <div class="password-wrapper">
                    <input type="password" name="password" id="register-password" placeholder="Минимум 6 символов" required minlength="6">
                    <button type="button" class="toggle-password" onclick="togglePassword('register-password', this)">👁️</button>
                </div>
            </div>
            <div class="form-group">
                <label>Роль</label>
                <select name="role">
                    <option value="employee">👨‍💼 Сотрудник</option>
                    <option value="it_specialist">🛠️ IT-специалист</option>
                </select>
            </div>
            <button type="submit" class="btn-primary">✅ Зарегистрироваться</button>
        </form>

        <div class="auth-link">
            Уже есть аккаунт? <a href="/login">Войти →</a>
        </div>
    </div>
</div>
{% endblock %}
