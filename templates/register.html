{% extends 'base.html' %}

{% block title %}Регистрация — IT Helpdesk{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="logo-center">
            <h1>IT HELPDESK</h1>
            <p>ООО «МАГНАТ»</p>
        </div>
        <div class="sub">Создайте аккаунт</div>

        <form method="POST">
            <div class="form-group">
                <label>📝 Полное ФИО</label>
                <input type="text" name="full_name" placeholder="Введите полное ФИО" required>
            </div>
            <div class="form-group">
                <label>🔑 Логин</label>
                <input type="text" name="username" placeholder="Придумайте логин" required>
            </div>
            <div class="form-group">
                <label>📧 Email</label>
                <input type="email" name="email" placeholder="your@email.com" required>
            </div>
            <div class="form-group" style="font-size:0.75rem; color:var(--text-muted); padding:8px 12px; background:var(--input-bg); border-radius:var(--radius); margin-bottom:12px;">
                ℹ️ В ближайшее время будет доступно подтверждение по почте. Пока регистрация проходит без кода.
            </div>
            <div class="form-group">
                <label>🔒 Пароль</label>
                <input type="password" name="password" placeholder="Минимум 6 символов" required minlength="6">
            </div>
            <div class="form-group">
                <label>Выберите роль</label>
                <select name="role">
                    <option value="employee">👨‍💼 Сотрудник</option>
                    <option value="it_specialist">🛠️ IT-специалист</option>
                </select>
            </div>
            <button type="submit" class="btn-primary">✅ Зарегистрироваться</button>
        </form>

        <div class="auth-link">
            Уже есть аккаунт? <a href="/login">Войти →</a>
        </div>
    </div>
</div>
{% endblock %}
