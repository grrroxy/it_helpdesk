{% extends 'base.html' %}

{% block title %}Регистрация — IT Helpdesk{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="logo-center">
            <h1>IT HELPDESK</h1>
            <p>ООО «МАГНАТ»</p>
        </div>
        <div class="sub">Создайте аккаунт</div>

        <form method="POST">
            <div class="form-group">
                <label>📝 Полное ФИО</label>
                <input type="text" name="full_name" placeholder="Введите полное ФИО" required>
            </div>
            <div class="form-group">
                <label>🔑 Логин</label>
                <input type="text" name="username" placeholder="Придумайте логин" required>
            </div>
            <div class="form-group">
                <label>📧 Email</label>
                <input type="email" name="email" placeholder="your@email.com" required>
            </div>
            <div class="form-group" style="font-size:0.75rem; color:var(--text-muted); padding:10px 14px; background:var(--input-bg); border-radius:var(--radius); margin-bottom:12px; border-left:3px solid var(--accent-primary);">
                ℹ️ В ближайшее время будет доступно подтверждение по почте. Пока регистрация проходит без кода.
            </div>
            <div class="form-group" style="position:relative;">
                <label>🔒 Пароль</label>
                <input type="password" name="password" id="register-password" placeholder="Минимум 6 символов" required minlength="6" style="padding-right: 50px;">
                <button type="button" class="toggle-password" onclick="togglePassword('register-password', this)" style="position:absolute; right:12px; top:38px; background:none; border:none; font-size:1.2rem; cursor:pointer; color:var(--text-muted); padding:4px;">
                    👁️
                </button>
            </div>
            <div class="form-group">
                <label>Выберите роль</label>
                <select name="role">
                    <option value="employee">👨‍💼 Сотрудник (создаю заявки)</option>
                    <option value="it_specialist">🛠️ IT-специалист (принимаю заявки)</option>
                </select>
            </div>
            <button type="submit" class="btn-primary">✅ Зарегистрироваться</button>
        </form>

        <div class="auth-link">
            Уже есть аккаунт? <a href="/login">Войти →</a>
        </div>
    </div>
</div>

<style>
    .toggle-password:hover {
        opacity: 0.7;
    }
    body.dark .toggle-password {
        color: var(--text-muted);
    }
</style>

<script>
    function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        if (input.type === 'password') {
            input.type = 'text';
            btn.textContent = '🙈';
        } else {
            input.type = 'password';
            btn.textContent = '👁️';
        }
    }
</script>
{% endblock %}
