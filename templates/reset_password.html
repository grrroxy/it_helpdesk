<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новый пароль — IT Helpdesk</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #f2f2f7;
            --bg-card: rgba(255,255,255,0.95);
            --text-primary: #000000;
            --text-secondary: #6c6c70;
            --border-color: #c6c6c8;
            --input-bg: rgba(0,0,0,0.05);
            --shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }

        body.dark {
            --bg-primary: #000000;
            --bg-card: rgba(28,28,30,0.95);
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
            --border-color: #38383a;
            --input-bg: rgba(255,255,255,0.1);
            --shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.3s;
        }

        .theme-top-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 10px 15px;
            cursor: pointer;
            font-size: 1.2rem;
            z-index: 100;
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 48px 40px;
            width: 420px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
        }

        .sub {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.85rem;
        }

        .input-group {
            position: relative;
            margin: 0.8rem 0;
        }

        .input-group input {
            width: 100%;
            padding: 1rem 1.2rem;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            color: var(--text-primary);
            font-size: 1rem;
            padding-right: 50px;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 1.2rem;
            background: none;
            border: none;
            color: var(--text-secondary);
            z-index: 10;
            padding: 5px;
        }

        .toggle-password:hover {
            opacity: 0.7;
        }

        button[type="submit"] {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 32px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }
        .back-link a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
        }

        .error {
            background: rgba(255,69,58,0.2);
            color: #ff453a;
            padding: 0.75rem;
            border-radius: 20px;
            margin-top: 1rem;
            text-align: center;
            font-size: 0.85rem;
        }

        .hint {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: -0.3rem;
            margin-bottom: 0.5rem;
            text-align: left;
        }
    </style>
</head>
<body>
<button class="theme-top-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>

<div class="card">
    <h1>Новый пароль</h1>
    <div class="sub">Придумайте новый пароль</div>

    <form method="POST">
        <div class="input-group">
            <input type="password" name="new_password" id="new_password" placeholder="Новый пароль" required>
            <button type="button" class="toggle-password" onclick="togglePassword('new_password')">👁️</button>
        </div>
        <div class="hint">🔒 Пароль должен быть минимум 6 символов</div>
        
        <div class="input-group">
            <input type="password" name="confirm_password" id="confirm_password" placeholder="Повторите пароль" required>
            <button type="button" class="toggle-password" onclick="togglePassword('confirm_password')">👁️</button>
        </div>
        
        <button type="submit">✅ Сохранить пароль</button>
    </form>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <div class="back-link">
        <a href="/login">← Вернуться ко входу</a>
    </div>
</div>

<script>
    function togglePassword(fieldId) {
        const field = document.getElementById(fieldId);
        const btn = event.currentTarget;
        if (field.type === 'password') {
            field.type = 'text';
            btn.innerHTML = '🙈';
        } else {
            field.type = 'password';
            btn.innerHTML = '👁️';
        }
    }

    function toggleTheme() {
        document.body.classList.toggle('dark');
        const btn = document.getElementById('themeBtn');
        if (document.body.classList.contains('dark')) {
            btn.innerHTML = '☀️';
            localStorage.setItem('theme', 'dark');
        } else {
            btn.innerHTML = '🌙';
            localStorage.setItem('theme', 'light');
        }
    }
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
        document.getElementById('themeBtn').innerHTML = '☀️';
    }
</script>
</body>
</html>
